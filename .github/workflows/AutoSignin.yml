name: AutoSignin
on:
  schedule:
    - cron: '0 1 * * *'  # 每天北京时间 9:00 自动签到
  workflow_dispatch:      # 允许手动触发
  watch:
    types: [started]       # 点 Star 也会触发一次（和教程提示对应）

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 执行签到脚本
        env:
          COOKIE: ${{ secrets.COOKIE }}  # 这里已经和你设置的密钥名一致了
        run: |
          python main.py  # 这里要改成你仓库里签到脚本的实际文件名
